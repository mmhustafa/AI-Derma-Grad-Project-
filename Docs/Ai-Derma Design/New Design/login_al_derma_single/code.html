<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-secondary-container rounded-full blur-[100px]"></div>

<p class="text-on-surface-variant">Enter your clinical credentials to continue</p>
</header>
<form action="#" class="space-y-8" method="POST" onsubmit="return false;">
<div class="space-y-6">
<div class="space-y-1.5">
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase ml-1" for="email">Email Address</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-high border-b-2 border-transparent focus:border-primary-container focus:ring-0 px-4 py-3 rounded-t-lg text-on-surface placeholder:text-outline-variant transition-all" id="email" name="email" placeholder="doctor@alderma.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center mb-1">
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase ml-1" for="password">Password</label>
<a class="text-xs font-bold text-primary-container hover:text-primary transition-colors tracking-tight" href="#">FORGOT PASSWORD?</a>
</div>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-high border-b-2 border-transparent focus:border-primary-container focus:ring-0 px-4 py-3 rounded-t-lg text-on-surface placeholder:text-outline-variant transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white py-4 rounded-full font-headline font-bold text-lg shadow-lg hover:shadow-primary-container/20 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
        Login
        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<footer class="mt-10 pt-8 border-t border-surface-variant/30 flex flex-col items-center gap-4">
<p class="text-on-surface-variant text-sm">
      Don't have an account?

</p>
<div class="w-full flex flex-col items-center justify-center">
