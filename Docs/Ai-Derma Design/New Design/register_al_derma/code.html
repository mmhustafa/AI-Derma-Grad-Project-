<h1 class="font-headline text-5xl font-extrabold text-on-surface leading-tight">
                Advanced Care for Your <span class="text-primary-container">Skin Health.</span>
</h1>
<p class="text-on-surface-variant text-lg leading-relaxed">
                Join our clinical sanctuary for professional-grade skin analysis and personalized treatment tracking.
            </p>
<div class="relative w-full aspect-square rounded-xl overflow-hidden shadow-2xl">

<div class="absolute inset-0 bg-gradient-to-tr from-primary/20 to-transparent"></div>
</div>
</div>
<!-- Right Column: Registration Card -->
<div class="w-full max-w-md">
<!-- Mobile Branding -->
<div class="lg:hidden flex flex-col items-center mb-10 text-center">
<span class="font-headline text-2xl font-extrabold tracking-tight text-primary mb-2">Al-Derma</span>
<p class="text-on-surface-variant text-sm font-medium tracking-wide uppercase">Clinical Sanctuary</p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-8 lg:p-10 shadow-[0_8px_24px_rgba(0,62,88,0.06)]">
<div class="mb-10">
<h2 class="font-headline text-3xl font-bold text-on-surface tracking-tight">Create Account</h2>
<p class="text-on-surface-variant mt-2">Start your journey to healthier skin today.</p>
</div>
<form class="space-y-6">
<!-- Input: Full Name -->
<div class="space-y-1.5">
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase ml-1" for="name">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-b-2 border-transparent focus:border-primary-container focus:ring-0 transition-all px-4 py-3 rounded-t-lg text-on-surface placeholder:text-outline-variant" id="name" placeholder="Dr. Jane Smith" type="text"/>
</div>
</div>
<!-- Input: Email -->
<div class="space-y-1.5">
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-b-2 border-transparent focus:border-primary-container focus:ring-0 transition-all px-4 py-3 rounded-t-lg text-on-surface placeholder:text-outline-variant" id="email" placeholder="jane@clinic.com" type="email"/>
</div>
</div>
<!-- Input: Password -->
<div class="space-y-1.5">
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-b-2 border-transparent focus:border-primary-container focus:ring-0 transition-all px-4 py-3 rounded-t-lg text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-outline-variant text-secondary focus:ring-secondary/20 transition-all cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-relaxed select-none" for="terms">
                            I agree to the <a class="text-primary-container font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary-container font-semibold hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Register Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold py-4 rounded-full shadow-lg shadow-primary-container/20 active:scale-95 transition-transform duration-200 mt-4" type="submit">
                        Register
                    </button>
</form>
<div class="mt-10 pt-8 border-t border-surface-variant/30 text-center">
<p class="text-on-surface-variant">

                        <a class="text-primary font-bold ml-1 hover:text-primary-container transition-colors" href="#">Login</a>
</p>
</div>
