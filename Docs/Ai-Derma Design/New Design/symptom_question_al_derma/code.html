<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "tertiary": "#006e1c",
            "surface-container-low": "#eff4fa",
            "primary-fixed-dim": "#82cfff",
            "surface-container-lowest": "#ffffff",
            "outline-variant": "#bdc8d1",
            "primary": "#00658d",
            "on-primary-fixed-variant": "#004c6b",
            "on-surface-variant": "#3e4850",
            "secondary-container": "#5ce9fe",
            "inverse-primary": "#82cfff",
            "primary-fixed": "#c6e7ff",
            "on-secondary-fixed": "#001f24",
            "inverse-surface": "#2c3135",
            "surface-variant": "#dee3e8",
            "on-primary-fixed": "#001e2d",
            "tertiary-fixed-dim": "#78dc77",
            "surface-tint": "#00658d",
            "on-tertiary-fixed-variant": "#005313",
            "on-background": "#171c20",
            "on-secondary-fixed-variant": "#004f58",
            "background": "#f5faff",
            "surface-container-high": "#e4e9ee",
            "on-tertiary": "#ffffff",
            "on-secondary": "#ffffff",
            "surface-bright": "#f5faff",
            "secondary": "#006874",
            "secondary-fixed": "#98f0ff",
            "outline": "#6e7881",
            "on-secondary-container": "#006773",
            "on-tertiary-container": "#00430e",
            "on-tertiary-fixed": "#002204",
            "on-primary": "#ffffff",
            "on-primary-container": "#003e58",
            "tertiary-fixed": "#94f990",
            "surface-container-highest": "#dee3e8",
            "error": "#ba1a1a",
            "error-container": "#ffdad6",
            "on-error": "#ffffff",
            "on-surface": "#171c20",
            "on-error-container": "#93000a",
            "surface-container": "#eaeef4",
            "secondary-fixed-dim": "#45d8ed",
            "inverse-on-surface": "#ecf1f7",
            "surface": "#f5faff",
            "primary-container": "#00aeef",
            "tertiary-container": "#54b757",
            "surface-dim": "#d6dae0"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 {
      font-family: 'Manrope', sans-serif;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- Navigation Shell (TopAppBar) -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg fixed top-0 w-full z-50 shadow-[0_8px_24px_rgba(0,62,88,0.06)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-[#00658d] dark:text-[#00aeef] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-['Manrope'] font-bold text-lg tracking-tight text-[#00658d] dark:text-[#00aeef]">Al-Derma</span>
</div>
<div class="flex items-center gap-2">
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase text-slate-400">Diagnosis In Progress</span>
</div>
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full">
<!-- Progress Indicator -->
<div class="mb-12">
<div class="flex justify-between items-end mb-4">
<div>
<span class="font-label text-[10px] tracking-widest uppercase text-outline font-bold">Assessment Progress</span>
<p class="font-headline text-2xl font-extrabold text-primary">Step 1 of 8</p>
</div>
<div class="text-right">
<span class="font-headline text-sm font-bold text-tertiary">12% Complete</span>
</div>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-[12.5%] bg-gradient-to-r from-primary to-primary-container rounded-full"></div>
</div>
</div>
<!-- Question Section -->
<section class="mb-10">
<h1 class="font-headline text-3xl font-extrabold text-on-surface leading-tight tracking-tight mb-8">
        Is the affected area itchy?
      </h1>
<!-- Visual Context (Optional but high-end) -->
<!-- Selection Options -->
<div class="space-y-4">
<!-- Yes Card -->
<label class="group relative flex items-center p-6 rounded-xl bg-surface-container-lowest shadow-[0_4px_12px_rgba(0,62,88,0.03)] cursor-pointer transition-all duration-200 hover:shadow-[0_8px_24px_rgba(0,62,88,0.08)] active:scale-[0.98]">
<input class="hidden peer" name="itchy" type="radio"/>
<div class="flex-grow">
<h3 class="font-headline text-xl font-bold text-on-surface group-hover:text-primary transition-colors">Yes</h3>
<p class="text-on-surface-variant text-sm mt-1">I feel a persistent or occasional urge to scratch.</p>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center transition-all peer-checked:bg-secondary peer-checked:border-secondary">
<span class="material-symbols-outlined text-white opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check" style="font-variation-settings: 'wght' 600;">check</span>
</div>
<!-- Selection Overlay -->
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-secondary/20 peer-checked:bg-secondary/5 -z-10"></div>
</label>
<!-- No Card -->
<label class="group relative flex items-center p-6 rounded-xl bg-surface-container-lowest shadow-[0_4px_12px_rgba(0,62,88,0.03)] cursor-pointer transition-all duration-200 hover:shadow-[0_8px_24px_rgba(0,62,88,0.08)] active:scale-[0.98]">
<input class="hidden peer" name="itchy" type="radio"/>
<div class="flex-grow">
<h3 class="font-headline text-xl font-bold text-on-surface group-hover:text-primary transition-colors">No</h3>
<p class="text-on-surface-variant text-sm mt-1">There is no itching or irritation in this area.</p>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center transition-all peer-checked:bg-secondary peer-checked:border-secondary">
<span class="material-symbols-outlined text-white opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check" style="font-variation-settings: 'wght' 600;">check</span>
</div>
<!-- Selection Overlay -->
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-secondary/20 peer-checked:bg-secondary/5 -z-10"></div>
</label>
</div>
</section>
<!-- Contextual Hint -->
</main>
<!-- Sticky Footer Actions -->
<footer class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl px-6 py-6 border-t border-outline-variant/10 shadow-[0_-8px_32px_rgba(0,62,88,0.08)] z-40">
<div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
<button class="flex-1 py-4 px-6 rounded-full font-headline font-bold text-primary bg-surface-container-lowest border border-primary/20 hover:bg-primary/5 transition-all active:scale-95 text-center">
        Back
      </button>
<button class="flex-[2] py-4 px-6 rounded-full font-headline font-bold text-white bg-gradient-to-r from-primary to-primary-container shadow-lg shadow-primary/20 hover:opacity-90 transition-all active:scale-95 text-center flex items-center justify-center gap-2">
        Next
        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
