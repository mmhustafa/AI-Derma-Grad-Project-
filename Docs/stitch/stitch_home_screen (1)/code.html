<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI-Derma Home Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#007AFF", // Stronger blue for buttons
            "primary-accent": "#E5F1FF", // Soft blue for icon backgrounds
            "text-primary": "#1C1C1E", // Darker text for headings
            "text-secondary": "#636366", // Lighter text for subheadings
            "background-light": "#F9F9F9", // A slightly off-white bg
            "background-dark": "#13191f",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.75rem", // Increased from 0.5rem
            "xl": "1rem", // Increased from 0.75rem
            "2xl": "1.25rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
    }
    body {
      min-height: 100dvh;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>

<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="flex size-10 shrink-0 items-center justify-start">
</div>
<h1 class="text-text-primary dark:text-slate-50 text-xl font-bold leading-tight flex-1 text-center">AI-Derma</h1>
<div class="flex w-10 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 w-10 bg-transparent text-slate-600 dark:text-slate-300 gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">more_horiz</span>
</button>
</div>
</header>
<main class="flex flex-col flex-1 px-4 py-2 w-full max-w-lg mx-auto">
<div class="p-4 @container">
<div class="flex flex-col items-stretch justify-start rounded-2xl @xl:flex-row @xl:items-start shadow-lg shadow-blue-500/10 dark:shadow-[0_4px_12px_rgba(0,0,0,0.2)] bg-gradient-to-br from-blue-200 to-teal-100 dark:from-blue-900/50 dark:to-teal-900/50">
<div class="flex w-full grow flex-col items-stretch justify-center gap-4 p-6">
<h2 class="text-text-primary dark:text-slate-50 text-2xl font-extrabold leading-tight tracking-[-0.015em]">Start Diagnosis</h2>
<p class="text-text-secondary dark:text-slate-300 text-base font-normal leading-normal">Begin your preliminary skin assessment.</p>
<div class="flex flex-col sm:flex-row items-center gap-3 justify-between mt-4">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary text-white text-sm font-bold leading-normal tracking-wide hover:bg-primary/90 transition-colors shadow-md shadow-blue-500/20 gap-2">
<span class="material-symbols-outlined">photo_camera</span>
<span class="truncate">Continue with Photo</span>
</button>
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-transparent text-primary dark:text-blue-300 text-sm font-bold leading-normal tracking-wide ring-1 ring-inset ring-primary dark:ring-blue-300 hover:bg-primary/10 dark:hover:bg-primary/20 transition-colors gap-2">
<span class="material-symbols-outlined">checklist</span>
<span class="truncate">Go to Symptom Questions</span>
</button>
</div>
</div>
</div>
</div>
<div class="flex flex-1 gap-4 flex-col items-stretch px-4 py-3 mt-4">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center overflow-hidden rounded-xl h-16 px-5 bg-white dark:bg-slate-800 text-text-primary dark:text-slate-50 text-base font-semibold leading-normal w-full shadow-[0_4px_12px_rgba(0,0,0,0.05)] dark:shadow-[0_2px_8px_rgba(0,0,0,0.2)] hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-accent dark:bg-blue-900/50 mr-4">
<span class="material-symbols-outlined text-primary dark:text-blue-300">history</span>
</div>
<span class="truncate text-left flex-1">History</span>
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500">chevron_right</span>
</button>
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center overflow-hidden rounded-xl h-16 px-5 bg-white dark:bg-slate-800 text-text-primary dark:text-slate-50 text-base font-semibold leading-normal w-full shadow-[0_4px_12px_rgba(0,0,0,0.05)] dark:shadow-[0_2px_8px_rgba(0,0,0,0.2)] hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-accent dark:bg-blue-900/50 mr-4">
<span class="material-symbols-outlined text-primary dark:text-blue-300">help</span>
</div>
<span class="truncate text-left flex-1">About &amp; Instructions</span>
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500">chevron_right</span>
</button>
</div>
<div class="flex flex-col gap-3 px-4 py-3 mt-4">
<div class="flex items-start p-4 rounded-xl bg-blue-50 dark:bg-blue-900/30 shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-blue-500 dark:text-blue-300 mr-3 mt-0.5 text-xl">lightbulb</span>
<p class="text-sm text-blue-800 dark:text-blue-200 flex-1">Did you know? Early detection improves treatment outcomes.</p>
</div>
<div class="flex items-start p-4 rounded-xl bg-teal-50 dark:bg-teal-900/30 shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-teal-600 dark:text-teal-300 mr-3 mt-0.5 text-xl">info</span>
<p class="text-sm text-teal-800 dark:text-teal-200 flex-1">Skin Care Tip: Use sunscreen daily to protect your skin.</p>
</div>
</div>
</main>
<footer class="w-full mt-auto">
<div class="text-center pb-8 pt-4 px-6">
<p class="text-text-secondary dark:text-slate-500 text-xs font-normal leading-normal">
          Designed for skin health awareness.
        </p>
<p class="text-text-secondary dark:text-slate-500 text-xs font-normal leading-normal mt-1">
          Your well-being is our priority.
        </p>
</div>
</footer>
<div class="hidden absolute top-0 left-0 h-full w-full flex-col justify-end items-stretch bg-black/40 z-20">
<div class="flex flex-col items-stretch bg-white dark:bg-background-dark rounded-t-2xl shadow-2xl">
<div class="flex h-5 w-full items-center justify-center pt-3 cursor-grab">
<div class="h-1 w-9 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<div class="p-4 pt-2">
<h3 class="text-lg font-bold text-text-primary dark:text-slate-50 text-center py-4">Choose Method</h3>
<div class="flex flex-col gap-4 py-2">
<button class="flex items-center gap-4 p-4 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl">photo_camera</span>
<span class="text-base font-semibold text-text-primary dark:text-slate-50">Continue with Photo</span>
</button>
<button class="flex items-center gap-4 p-4 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl">chat_bubble</span>
<span class="text-base font-semibold text-text-primary dark:text-slate-50">Continue without Photo</span>
</button>
</div>
</div>
</div>
</div>
</div>
