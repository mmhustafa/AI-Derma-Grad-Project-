<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Symptom Questions Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#358fe9",
              "background-light": "#f6f7f8",
              "background-dark": "#111921",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-zinc-900 dark:text-zinc-200">arrow_back_ios_new</span>
</div>
<h2 class="text-zinc-900 dark:text-zinc-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Symptom Assessment</h2>
<div class="size-12 shrink-0"></div> <!-- Spacer -->
</div>
<div class="flex flex-col flex-grow px-4">
<!-- Progress Bar -->
<div class="flex flex-col gap-2 py-4">
<div class="flex gap-6 justify-between">
<p class="text-zinc-800 dark:text-zinc-300 text-sm font-medium leading-normal">Step 1 of 8</p>
</div>
<div class="rounded-full bg-zinc-200 dark:bg-zinc-700">
<div class="h-2 rounded-full bg-primary" style="width: 13%;"></div>
</div>
</div>
<!-- Main Content Area -->
<div class="flex-grow flex flex-col justify-center">
<!-- Headline Text -->
<h2 class="text-zinc-900 dark:text-zinc-100 text-3xl font-bold leading-tight px-0 text-left pb-6 pt-5">Is the affected area itchy?</h2>
<!-- Radio List -->
<div class="flex flex-col gap-4">
<label class="flex items-center gap-4 rounded-lg border border-solid border-zinc-300 dark:border-zinc-700 p-4 transition-colors duration-200 has-[:checked]:border-primary has-[:checked]:bg-primary/10 dark:has-[:checked]:bg-primary/20">
<div class="flex grow flex-col">
<p class="text-zinc-900 dark:text-zinc-100 text-base font-medium leading-normal">Yes</p>
</div>
<input class="h-5 w-5 shrink-0 cursor-pointer appearance-none rounded-full border-2 border-zinc-400 dark:border-zinc-600 checked:border-[5px] checked:border-primary focus:outline-none" name="symptom-itchy" type="radio"/>
</label>
<label class="flex items-center gap-4 rounded-lg border border-solid border-zinc-300 dark:border-zinc-700 p-4 transition-colors duration-200 has-[:checked]:border-primary has-[:checked]:bg-primary/10 dark:has-[:checked]:bg-primary/20">
<div class="flex grow flex-col">
<p class="text-zinc-900 dark:text-zinc-100 text-base font-medium leading-normal">No</p>
</div>
<input class="h-5 w-5 shrink-0 cursor-pointer appearance-none rounded-full border-2 border-zinc-400 dark:border-zinc-600 checked:border-[5px] checked:border-primary focus:outline-none" name="symptom-itchy" type="radio"/>
</label>
</div>
</div>
</div>
<!-- Button Group -->
<div class="flex justify-stretch bg-background-light dark:bg-background-dark sticky bottom-0 border-t border-zinc-200 dark:border-zinc-800">
<div class="flex flex-1 gap-4 flex-wrap px-4 py-4 justify-between">
<button class="flex min-w-[84px] max-w-[480px] flex-1 cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 bg-zinc-200 dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 text-base font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Back</span>
</button>
<button class="flex min-w-[84px] max-w-[480px] flex-1 cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Next</span>
</button>
</div>
</div>
</div>
</body></html>
