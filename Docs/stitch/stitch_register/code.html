<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI-Derma Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4DB6AC",
              "background-light": "#F8F9FA",
              "background-dark": "#111d21",
              "text-light": "#333333",
              "text-dark": "#E0E0E0",
              "border-light": "#dce3e5",
              "border-dark": "#374151",
              "placeholder-light": "#637f88",
              "placeholder-dark": "#9CA3AF"
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "1rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Abstract Background Graphic -->
<div class="absolute top-0 right-0 w-1/2 h-1/2 -z-0 opacity-10 dark:opacity-5">
<svg fill="none" height="100%" viewbox="0 0 400 400" width="100%" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_105_234)">
<path d="M400 200C400 310.457 310.457 400 200 400C89.543 400 0 310.457 0 200C0 89.543 89.543 0 200 0C310.457 0 400 89.543 400 200Z" fill="url(#paint0_radial_105_234)"></path>
<path d="M400 200C400 310.457 310.457 400 200 400C89.543 400 0 310.457 0 200C0 89.543 89.543 0 200 0C310.457 0 400 89.543 400 200Z" fill="url(#paint1_radial_105_234)"></path>
</g>
<defs>
<radialgradient cx="0" cy="0" gradienttransform="translate(400) rotate(90) scale(400)" gradientunits="userSpaceOnUse" id="paint0_radial_105_234" r="1">
<stop stop-color="#4DB6AC"></stop>
<stop offset="1" stop-color="#4DB6AC" stop-opacity="0"></stop>
</radialgradient>
<radialgradient cx="0" cy="0" gradienttransform="translate(0 400) rotate(-90) scale(400)" gradientunits="userSpaceOnUse" id="paint1_radial_105_234" r="1">
<stop stop-color="#5C9EAD"></stop>
<stop offset="1" stop-color="#5C9EAD" stop-opacity="0"></stop>
</radialgradient>
<clippath id="clip0_105_234">
<rect fill="white" height="400" width="400"></rect>
</clippath>

</svg>
</div>
<main class="flex-1 flex flex-col justify-center px-4 py-8 z-10">
<div class="mx-auto w-full max-w-md">
<!-- Header -->
<div class="flex flex-col items-center text-center mb-8">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-4xl">health_and_safety</span>
<h1 class="text-3xl font-bold text-text-light dark:text-text-dark">AI-Derma</h1>
</div>
<h2 class="text-2xl font-bold tracking-tight text-text-light dark:text-text-dark">Create Your Secure Account</h2>
<p class="mt-2 text-base text-placeholder-light dark:text-placeholder-dark">Join to get personalized skin condition insights.</p>
</div>
<!-- Registration Form -->
<div class="flex flex-col gap-y-4">
<!-- Full Name Field -->
<label class="flex flex-col w-full">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">Full Name</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light dark:text-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-white dark:bg-background-dark/50 h-14 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] text-base font-normal leading-normal transition-all" placeholder="Enter your full name" value=""/>
</label>
<!-- Email Address Field -->
<label class="flex flex-col w-full">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">Email Address</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light dark:text-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-white dark:bg-background-dark/50 h-14 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] text-base font-normal leading-normal transition-all" placeholder="your.email@example.com" type="email" value=""/>
</label>
<!-- Password Field -->
<label class="flex flex-col w-full">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">Password</p>
<div class="flex w-full flex-1 items-stretch">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg text-text-light dark:text-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:z-10 border border-border-light dark:border-border-dark bg-white dark:bg-background-dark/50 h-14 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="Enter your password" type="password" value=""/>
<div class="text-placeholder-light dark:text-placeholder-dark flex border border-border-light dark:border-border-dark bg-white dark:bg-background-dark/50 items-center justify-center px-3 rounded-r-lg border-l-0">
<span class="material-symbols-outlined cursor-pointer">visibility</span>
</div>
</div>
</label>
<!-- Confirm Password Field -->
<label class="flex flex-col w-full">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">Confirm Password</p>
<div class="flex w-full flex-1 items-stretch">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg text-text-light dark:text-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:z-10 border border-border-light dark:border-border-dark bg-white dark:bg-background-dark/50 h-14 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="Confirm your password" type="password" value=""/>
<div class="text-placeholder-light dark:text-placeholder-dark flex border border-border-light dark:border-border-dark bg-white dark:bg-background-dark/50 items-center justify-center px-3 rounded-r-lg border-l-0">
<span class="material-symbols-outlined cursor-pointer">visibility</span>
</div>
</div>
</label>
</div>
<!-- Terms and Conditions -->
<div class="mt-6">
<p class="text-xs text-center text-placeholder-light dark:text-placeholder-dark">
                    By creating an account, you agree to our 
                    <a class="font-semibold text-primary hover:underline" href="#">Terms of Service</a> and 
                    <a class="font-semibold text-primary hover:underline" href="#">Privacy Policy</a>.
                </p>
</div>
<!-- Primary Button -->
<div class="mt-6">
<button class="flex w-full items-center justify-center rounded-lg h-14 px-6 text-base font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark transition-colors">Create Account</button>
</div>
<!-- Secondary Link to Log In -->
<div class="mt-8 text-center">
<p class="text-sm text-placeholder-light dark:text-placeholder-dark">
                    Already have an account? 
                    <a class="font-bold text-primary hover:underline" href="#">Log In</a>
</p>
</div>
</div>
</main>
</div>
</body></html>
