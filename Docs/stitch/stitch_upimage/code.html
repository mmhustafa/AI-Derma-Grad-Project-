<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Upload Image Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4a8fd3",
              "background-light": "#f6f7f8",
              "background-dark": "#13191f",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        font-size: 24px;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-200">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<header class="flex items-center p-4 pb-2 justify-between bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button class="text-gray-800 dark:text-gray-200 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="text-gray-900 dark:text-gray-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Upload Image</h1>
<div class="size-12 shrink-0"></div> <!-- Spacer for centering title -->
</header>
<main class="flex-grow flex flex-col p-4">
<!-- Upload Options Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-1 gap-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4 flex-col items-center justify-center text-center aspect-square cursor-pointer">
<span class="material-symbols-outlined text-primary text-4xl">photo_camera</span>
<div class="flex flex-col gap-1 mt-2">
<h2 class="text-gray-900 dark:text-gray-100 text-base font-bold leading-tight">Capture Photo</h2>
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal">Use your camera</p>
</div>
</div>
<div class="flex flex-1 gap-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4 flex-col items-center justify-center text-center aspect-square cursor-pointer">
<span class="material-symbols-outlined text-primary text-4xl">photo_library</span>
<div class="flex flex-col gap-1 mt-2">
<h2 class="text-gray-900 dark:text-gray-100 text-base font-bold leading-tight">From Gallery</h2>
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal">Choose from photos</p>
</div>
</div>
</div>
<!-- Image Preview Section -->
<div class="mt-6 flex h-48 items-center justify-center rounded-xl border-2 border-dashed border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50">
<div class="text-center">
<span class="material-symbols-outlined text-gray-400 dark:text-gray-500 text-5xl">image</span>
<p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Image preview will appear here</p>
</div>
</div>
<!-- Section Header for Tips -->
<h3 class="text-gray-900 dark:text-gray-100 text-lg font-bold leading-tight tracking-[-0.015em] pt-8 pb-3">For best results, please ensure:</h3>
<!-- Tips Grid -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
<div class="flex flex-1 gap-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4 items-center">
<span class="material-symbols-outlined text-primary">wb_sunny</span>
<h2 class="text-gray-900 dark:text-gray-100 text-base font-bold leading-tight">Good lighting</h2>
</div>
<div class="flex flex-1 gap-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4 items-center">
<span class="material-symbols-outlined text-primary">zoom_in</span>
<h2 class="text-gray-900 dark:text-gray-100 text-base font-bold leading-tight">Close-up view</h2>
</div>
<div class="flex flex-1 gap-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4 items-center">
<span class="material-symbols-outlined text-primary">center_focus_strong</span>
<h2 class="text-gray-900 dark:text-gray-100 text-base font-bold leading-tight">Clear focus</h2>
</div>
</div>
</main>
<!-- Sticky Footer with Button -->
<footer class="sticky bottom-0 bg-background-light dark:bg-background-dark p-4 border-t border-gray-200 dark:border-gray-700">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark">
<span class="truncate">Analyze with AI</span>
</button>
</footer>
</div>
</body></html>
