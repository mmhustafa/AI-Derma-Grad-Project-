<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Upload Image Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2dd4bf", // Medical Teal (Teal-400)
              "primary-hover": "#14b8a6", // Teal-500
              "background-dark": "#0f172a", // Slate-900
              "surface-dark": "#1e293b", // Slate-800
              "border-dark": "#334155", // Slate-700
              "text-light": "#f1f5f9", // Slate-100
              "text-muted": "#94a3b8", // Slate-400
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        font-size: 24px;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-text-light selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<header class="flex items-center p-4 pb-2 justify-between bg-background-dark/95 backdrop-blur-sm sticky top-0 z-30 border-b border-transparent transition-all">
<button class="text-text-light hover:text-primary transition-colors flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-surface-dark/50">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="text-text-light text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Upload Image</h1>
<div class="size-12 shrink-0"></div> 
</header>
<main class="flex-grow flex flex-col p-4 pb-24">
<div class="grid grid-cols-2 gap-4">
<button class="group flex flex-1 gap-3 rounded-2xl border border-border-dark bg-surface-dark p-5 flex-col items-center justify-center text-center aspect-square cursor-pointer transition-all hover:bg-slate-800 hover:border-primary/50 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-dark relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="p-3 rounded-full bg-background-dark shadow-sm group-hover:scale-110 transition-transform duration-300 relative z-10">
<span class="material-symbols-outlined text-primary text-4xl">photo_camera</span>
</div>
<div class="flex flex-col gap-1 mt-2 relative z-10">
<h2 class="text-text-light text-base font-bold leading-tight">Capture Photo</h2>
<p class="text-text-muted text-xs font-medium leading-normal">Use your camera</p>
</div>
</button>
<button class="group flex flex-1 gap-3 rounded-2xl border border-border-dark bg-surface-dark p-5 flex-col items-center justify-center text-center aspect-square cursor-pointer transition-all hover:bg-slate-800 hover:border-primary/50 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-dark relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="p-3 rounded-full bg-background-dark shadow-sm group-hover:scale-110 transition-transform duration-300 relative z-10">
<span class="material-symbols-outlined text-primary text-4xl">photo_library</span>
</div>
<div class="flex flex-col gap-1 mt-2 relative z-10">
<h2 class="text-text-light text-base font-bold leading-tight">From Gallery</h2>
<p class="text-text-muted text-xs font-medium leading-normal">Choose from photos</p>
</div>
</button>
</div>
<div class="mt-6 flex aspect-[4/3] w-full items-center justify-center rounded-2xl border-2 border-dashed border-border-dark bg-surface-dark/30 hover:bg-surface-dark/50 transition-colors cursor-pointer group">
<div class="text-center flex flex-col items-center">
<div class="mb-3 p-3 rounded-full bg-surface-dark group-hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-text-muted group-hover:text-primary transition-colors text-4xl">add_a_photo</span>
</div>
<p class="text-sm text-text-muted font-medium">Image preview will appear here</p>
</div>
</div>
<div class="pt-8 pb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">tips_and_updates</span>
<h3 class="text-text-light text-lg font-bold leading-tight tracking-[-0.015em]">For best results</h3>
</div>
<div class="grid grid-cols-1 gap-3">
<div class="flex flex-1 gap-4 rounded-xl border border-border-dark bg-surface-dark p-4 items-center shadow-sm">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-background-dark shrink-0 text-primary">
<span class="material-symbols-outlined text-[20px]">wb_sunny</span>
</div>
<div class="flex flex-col">
<h2 class="text-text-light text-sm font-bold leading-tight">Good lighting</h2>
<p class="text-text-muted text-xs mt-0.5">Ensure area is well-lit</p>
</div>
</div>
<div class="flex flex-1 gap-4 rounded-xl border border-border-dark bg-surface-dark p-4 items-center shadow-sm">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-background-dark shrink-0 text-primary">
<span class="material-symbols-outlined text-[20px]">zoom_in</span>
</div>
<div class="flex flex-col">
<h2 class="text-text-light text-sm font-bold leading-tight">Close-up view</h2>
<p class="text-text-muted text-xs mt-0.5">Focus on the specific area</p>
</div>
</div>
<div class="flex flex-1 gap-4 rounded-xl border border-border-dark bg-surface-dark p-4 items-center shadow-sm">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-background-dark shrink-0 text-primary">
<span class="material-symbols-outlined text-[20px]">center_focus_strong</span>
</div>
<div class="flex flex-col">
<h2 class="text-text-light text-sm font-bold leading-tight">Clear focus</h2>
<p class="text-text-muted text-xs mt-0.5">Avoid blurriness</p>
</div>
</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 bg-background-dark/95 backdrop-blur-md p-4 border-t border-border-dark z-20">
<button class="group flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-slate-900 text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary-hover transition-all shadow-lg shadow-primary/20 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-dark gap-2">
<span class="material-symbols-outlined transition-transform group-hover:rotate-12">auto_awesome</span>
<span class="truncate">Analyze with AI</span>
</button>
</footer>
</div>

</body></html>
