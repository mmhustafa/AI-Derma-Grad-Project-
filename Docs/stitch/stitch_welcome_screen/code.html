<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI-Derma Welcome Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4a8fd3",
              "background-light": "#f6f7f8",
              "background-dark": "#13191f",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-primary/10 to-background-light dark:from-primary/20 dark:to-background-dark"></div>
<!-- Abstract background illustration -->
<svg class="absolute bottom-0 right-0 h-auto w-full max-w-lg text-primary/10 dark:text-primary/20" viewbox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path d="M375.5,296Q353,342,323.5,379.5Q294,417,250,417Q194,417,149,384Q104,351,80,299.5Q56,248,84.5,200.5Q113,153,143.5,116Q174,79,212,71Q250,63,293.5,84Q337,105,364,142Q391,179,398,213.5Q405,248,375.5,296Z" fill="currentColor"></path>
</svg>
</div>
<div class="relative z-10 flex flex-1 flex-col px-6 pt-16 pb-8">
<div class="flex flex-1 flex-col items-center">
<!-- App Logo -->
<div class="mb-4 flex size-16 items-center justify-center rounded-2xl bg-primary text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-4xl">
                        health_and_safety
                    </span>
</div>
<!-- Headline -->
<h1 class="text-[#121417] dark:text-white tracking-tight text-[32px] font-bold leading-tight text-center pb-2 pt-4">AI-Derma</h1>
<!-- Body Text / Tagline -->
<p class="text-[#677583] dark:text-gray-400 text-base font-normal leading-normal pb-8 text-center max-w-xs">Smart Skin Disease Detection Assistant</p>
<div class="w-full space-y-4">
<!-- List Item 1: AI Photo Scan -->
<div class="flex items-center gap-4 bg-white/70 dark:bg-background-dark/70 backdrop-blur-sm rounded-xl p-4 shadow-sm">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-12">
<span class="material-symbols-outlined text-2xl">
                                photo_camera
                            </span>
</div>
<div class="flex flex-col justify-center">
<p class="text-[#121417] dark:text-white text-base font-medium leading-normal line-clamp-1">AI Photo Scan</p>
<p class="text-[#677583] dark:text-gray-400 text-sm font-normal leading-normal line-clamp-2">Instantly analyze skin conditions with your camera.</p>
</div>
</div>
<!-- List Item 2: Symptom Questions -->
<div class="flex items-center gap-4 bg-white/70 dark:bg-background-dark/70 backdrop-blur-sm rounded-xl p-4 shadow-sm">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-12">
<span class="material-symbols-outlined text-2xl">
                                checklist
                            </span>
</div>
<div class="flex flex-col justify-center">
<p class="text-[#121417] dark:text-white text-base font-medium leading-normal line-clamp-1">Symptom Questions</p>
<p class="text-[#677583] dark:text-gray-400 text-sm font-normal leading-normal line-clamp-2">Answer a few questions to refine the assessment.</p>
</div>
</div>
</div>
</div>
<!-- Disclaimer and Action Button Section -->
<div class="mt-8 w-full space-y-4">
<!-- Disclaimer -->
<div class="flex items-center gap-3 bg-transparent p-2">
<div class="text-[#677583] dark:text-gray-400 flex items-center justify-center shrink-0 size-6">
<span class="material-symbols-outlined text-xl">
                            info
                        </span>
</div>
<p class="text-[#677583] dark:text-gray-400 text-sm font-normal leading-normal flex-1">This app does not replace a medical diagnosis.</p>
</div>
<!-- Primary Button -->
<button class="flex h-12 w-full items-center justify-center rounded-xl bg-primary px-6 text-base font-medium text-white shadow-lg shadow-primary/30 transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 dark:ring-offset-background-dark">
                    Continue
                </button>
</div>
</div>
</div>
</body></html>
